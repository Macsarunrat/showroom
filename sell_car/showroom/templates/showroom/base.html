<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เต็นท์รถบ้านกระต่าย - คัดรถสวยคุณภาพดี</title>
    
    <!-- PWA & Mobile Optimization -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SellCar">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/car.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 pb-24">
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script> <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <a href="{% url 'car_list' %}" class="font-bold text-xl text-blue-900">
                🚗 เต็นท์รถบ้านกระต่าย
            </a>
            <a href="https://line.me/ti/p/~hutip" target="_blank" class="text-sm bg-[#06C755] text-white px-3 py-1 rounded-full shadow hover:bg-green-600 transition">
                Line: @hutip
            </a>
        </div>
    </nav>

    <div class="max-w-md mx-auto px-4 py-4">
        {% block content %}
        {% endblock %}
    </div>

    {% block footer %}
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-3 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-40">
        <div class="max-w-md mx-auto flex gap-2">
            <a href="tel:0896393052" class="flex-1 bg-white border-2 border-blue-600 text-blue-600 text-center py-2 rounded-lg font-bold hover:bg-blue-50 transition">
                📞 โทรเลย
            </a>
            <a href="https://line.me/ti/p/~hutip" target="_blank" class="flex-1 bg-[#06C755] text-white text-center py-2 rounded-lg font-bold hover:bg-green-600 transition">
                💬 ทัก Line
            </a>
        </div>
    </div>
    {% endblock %}

</body>
</html>
